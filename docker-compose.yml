name: tradinghub

# Tradinghub - Vollständiger Standalone-Betrieb
# Alle Services mit persistenten Volumes

services:
  # Next.js Tradinghub App
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: tradejournal-local:latest
    container_name: tradinghub_app
    ports:
      - "${APP_PORT:-3001}:3000"
    volumes:
      - tradinghub_app_cache:/app/.cache
    environment:
      NODE_ENV: production
      APP_CACHE_DIR: /app/.cache
      NEXT_PUBLIC_PARSE_APP_ID: ${PARSE_APP_ID:-tradenote123}
      NEXT_PUBLIC_PARSE_JS_KEY: ${PARSE_JS_KEY:-tradenote123}
      NEXT_PUBLIC_PARSE_SERVER_URL: ${NEXT_PUBLIC_PARSE_SERVER_URL:-http://localhost:28080/parse}
      REDIS_URL: redis://redis:6379
      INTERNAL_PARSE_SERVER_URL: http://backend:28080/parse
      MASTER_KEY: ${PARSE_MASTER_KEY:-tradenote123}
      DATABASE_URL: postgresql://${POSTGRES_USER:-tradenote}:${POSTGRES_PASSWORD:-tradenote_archive}@postgres:5432/${POSTGRES_DB:-setup_archive}
      IB_FLEX_TOKEN: ${IB_FLEX_TOKEN:-}
      IB_FLEX_QUERY_ID: ${IB_FLEX_QUERY_ID:-}
      YAHOO_PROXY_PRIMARY: ${YAHOO_PROXY_PRIMARY:-}
      YAHOO_PROXY_TIMEOUT_MS: ${YAHOO_PROXY_TIMEOUT_MS:-}
      YAHOO_PROXY_MAX_RETRIES: ${YAHOO_PROXY_MAX_RETRIES:-}
      YAHOO_PROXY_SESSION_TTL_MS: ${YAHOO_PROXY_SESSION_TTL_MS:-}
      YAHOO_PROXY_SESSION_MAX_REQUESTS: ${YAHOO_PROXY_SESSION_MAX_REQUESTS:-}
      YAHOO_PROXY_RETRY_BASE_MS: ${YAHOO_PROXY_RETRY_BASE_MS:-}
      YAHOO_PROXY_RETRY_MAX_MS: ${YAHOO_PROXY_RETRY_MAX_MS:-}
      SCRAPERAPI_KEY: ${SCRAPERAPI_KEY:-}
      SCRAPERAPI_ENDPOINT: ${SCRAPERAPI_ENDPOINT:-}
      SCRAPERAPI_COUNTRY: ${SCRAPERAPI_COUNTRY:-}
      SCRAPERAPI_PREMIUM: ${SCRAPERAPI_PREMIUM:-}
      BRIGHTDATA_PROXY_HOST: ${BRIGHTDATA_PROXY_HOST:-}
      BRIGHTDATA_PROXY_PORT: ${BRIGHTDATA_PROXY_PORT:-}
      BRIGHTDATA_PROXY_USERNAME: ${BRIGHTDATA_PROXY_USERNAME:-}
      BRIGHTDATA_PROXY_PASSWORD: ${BRIGHTDATA_PROXY_PASSWORD:-}
      BRIGHTDATA_PROXY_PROTOCOL: ${BRIGHTDATA_PROXY_PROTOCOL:-}
      OPENBB_ENABLED: ${OPENBB_ENABLED:-true}
      OPENBB_BASE_URL: ${OPENBB_BASE_URL:-}
      OPENBB_API_PREFIX: ${OPENBB_API_PREFIX:-}
      OPENBB_PROVIDER: ${OPENBB_PROVIDER:-yfinance}
      OPENBB_NEWS_PROVIDER: ${OPENBB_NEWS_PROVIDER:-fmp}
      OPENBB_API_KEY: ${OPENBB_API_KEY:-}
      OPENBB_TIMEOUT_MS: ${OPENBB_TIMEOUT_MS:-20000}
      OPENBB_CONCURRENCY: ${OPENBB_CONCURRENCY:-4}
      OPENBB_MAX_SYMBOLS_PER_SCAN: ${OPENBB_MAX_SYMBOLS_PER_SCAN:-1000}
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      openbb:
        condition: service_started
    networks:
      - tradinghub_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http = require('http'); const req = http.request({host: 'localhost', port: 3000, path: '/api/health', timeout: 5000}, (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }); req.on('error', () => process.exit(1)); req.end();\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Parse Server Backend (TradeNote)
  backend:
    image: ghcr.io/daerkle/tradenote-backend:latest
    container_name: tradinghub_backend
    ports:
      - "${BACKEND_PORT:-28080}:28080"
    environment:
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME:-tradenote}:${MONGO_ROOT_PASSWORD:-tradenote}@mongo:27017/${MONGO_DB:-tradenote}?authSource=admin
      TRADENOTE_DATABASE: ${MONGO_DB:-tradenote}
      APP_ID: ${PARSE_APP_ID:-tradenote123}
      MASTER_KEY: ${PARSE_MASTER_KEY:-tradenote123}
      TRADENOTE_PORT: 28080
      PARSE_SERVER_ALLOW_CLIENT_CLASS_CREATION: 1
      allowClientClassCreation: true
      PARSE_SERVER_SESSION_LENGTH: 2592000
      PARSE_SERVER_EXPIRE_INACTIVE_SESSIONS: false
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - tradinghub_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const net = require('net'); const client = new net.Socket(); client.connect(28080, 'localhost', () => { client.destroy(); process.exit(0); }); client.on('error', () => process.exit(1)); setTimeout(() => process.exit(1), 5000);\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  # MongoDB Datenbank
  mongo:
    image: mongo:7
    container_name: tradinghub_mongo
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - tradinghub_mongo_data:/data/db
      - tradinghub_mongo_config:/data/configdb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-tradenote}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-tradenote}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-tradenote}
    networks:
      - tradinghub_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # PostgreSQL Datenbank (Setup Archive)
  postgres:
    image: postgres:16-alpine
    container_name: tradinghub_postgres
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - tradinghub_postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tradenote}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tradenote_archive}
      POSTGRES_DB: ${POSTGRES_DB:-setup_archive}
    networks:
      - tradinghub_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradenote -d setup_archive"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: tradinghub_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - tradinghub_redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - tradinghub_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # OpenBB API (separate data provider instance)
  openbb:
    build:
      context: .
      dockerfile: Dockerfile.openbb
    image: tradejournal-openbb:latest
    container_name: tradinghub_openbb
    ports:
      - "${OPENBB_PORT:-6900}:6900"
    volumes:
      - tradinghub_openbb_data:/root/.openbb_platform
    networks:
      - tradinghub_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:6900', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

networks:
  tradinghub_net:
    driver: bridge
    name: tradinghub_network_v3

volumes:
  tradinghub_mongo_data:
    name: tradinghub_mongo_data
    driver: local
  tradinghub_mongo_config:
    name: tradinghub_mongo_config
    driver: local
  tradinghub_redis_data:
    name: tradinghub_redis_data
    driver: local
  tradinghub_postgres_data:
    name: tradinghub_postgres_data
    driver: local
  tradinghub_openbb_data:
    name: tradinghub_openbb_data
    driver: local
  tradinghub_app_cache:
    name: tradinghub_app_cache
    driver: local
